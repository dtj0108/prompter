name: Publish Prompter Update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-26
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate signing secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          : "${MACOS_CERTIFICATE:?Missing MACOS_CERTIFICATE GitHub secret}"
          : "${MACOS_CERTIFICATE_PASSWORD:?Missing MACOS_CERTIFICATE_PASSWORD GitHub secret}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY GitHub secret}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID GitHub secret}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER GitHub secret}"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/prompter-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$MACOS_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' \
              | head -1
          )"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No Developer ID Application identity was found in the imported certificate." >&2
            exit 1
          fi
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

      - name: Build application
        env:
          UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          BUILD_NUMBER=$((1000 + GITHUB_RUN_NUMBER))
          VERSION="1.0.$BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          ./scripts/build-app.sh \
            --identity "$SIGNING_IDENTITY" \
            --version "$VERSION" \
            --build "$BUILD_NUMBER" \
            --update-repository "$UPDATE_REPOSITORY"

      - name: Notarize and staple application
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          SUBMISSION="$RUNNER_TEMP/Prompter-notarization.zip"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          ditto -c -k --sequesterRsrc --keepParent build/Prompter.app "$SUBMISSION"
          xcrun notarytool submit "$SUBMISSION" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple build/Prompter.app
          xcrun stapler validate build/Prompter.app
          spctl --assess --type execute --verbose=4 build/Prompter.app

      - name: Package and create update manifest
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/Prompter.app dist/Prompter.zip
          SHA256="$(shasum -a 256 dist/Prompter.zip | awk '{print $1}')"
          jq -n \
            --arg version "$VERSION" \
            --argjson build "$BUILD_NUMBER" \
            --arg sha256 "$SHA256" \
            --arg notes "Update from commit $GITHUB_SHA" \
            '{version: $version, build: $build, sha256: $sha256, notes: $notes}' \
            > dist/update.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$VERSION"
          gh release create "$TAG" \
            dist/Prompter.zip \
            dist/update.json \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Prompter $VERSION" \
            --generate-notes \
            --latest

      - name: Remove temporary signing keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8
          security delete-keychain "$RUNNER_TEMP/prompter-signing.keychain-db" 2>/dev/null || true
