name: Publish Prompter Update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-26
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Build application
        env:
          UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          BUILD_NUMBER=$((1000 + GITHUB_RUN_NUMBER))
          VERSION="1.0.$BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          ./scripts/build-app.sh \
            --version "$VERSION" \
            --build "$BUILD_NUMBER" \
            --update-repository "$UPDATE_REPOSITORY"

      - name: Package and create update manifest
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/Prompter.app dist/Prompter.zip
          SHA256="$(shasum -a 256 dist/Prompter.zip | awk '{print $1}')"
          jq -n \
            --arg version "$VERSION" \
            --argjson build "$BUILD_NUMBER" \
            --arg sha256 "$SHA256" \
            --arg notes "Update from commit $GITHUB_SHA" \
            '{version: $version, build: $build, sha256: $sha256, notes: $notes}' \
            > dist/update.json

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$VERSION"
          gh release create "$TAG" \
            dist/Prompter.zip \
            dist/update.json \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Prompter $VERSION" \
            --generate-notes \
            --latest
