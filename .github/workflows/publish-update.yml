name: Publish Prompter Update

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-26
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Validate signing secrets
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          : "${MACOS_CERTIFICATE:?Missing MACOS_CERTIFICATE GitHub secret}"
          : "${MACOS_CERTIFICATE_PASSWORD:?Missing MACOS_CERTIFICATE_PASSWORD GitHub secret}"
          : "${APPLE_API_KEY:?Missing APPLE_API_KEY GitHub secret}"
          : "${APPLE_API_KEY_ID:?Missing APPLE_API_KEY_ID GitHub secret}"
          : "${APPLE_API_ISSUER:?Missing APPLE_API_ISSUER GitHub secret}"

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/prompter-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          printf '%s' "$MACOS_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
              | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' \
              | head -1
          )"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "No Developer ID Application identity was found in the imported certificate." >&2
            exit 1
          fi
          echo "SIGNING_IDENTITY=$SIGNING_IDENTITY" >> "$GITHUB_ENV"

          SIGNING_CERT_SHA256="$(
            security find-certificate -c "$SIGNING_IDENTITY" -p "$KEYCHAIN_PATH" \
              | openssl x509 -outform der \
              | shasum -a 256 \
              | awk '{print $1}'
          )"
          if [[ ! "$SIGNING_CERT_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo "Could not fingerprint the imported Developer ID certificate." >&2
            exit 1
          fi
          echo "SIGNING_CERT_SHA256=$SIGNING_CERT_SHA256" >> "$GITHUB_ENV"

      - name: Create Developer ID provisioning profile
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/Prompter.provisionprofile"
          node scripts/create-apple-developer-id-profile.mjs --output "$PROFILE_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/Prompter-profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          test "$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$PROFILE_PLIST")" = "F3FXXB2HL6.com.drew.prompter"
          test "$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.team-identifier' "$PROFILE_PLIST")" = "F3FXXB2HL6"
          /usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.associated-domains' "$PROFILE_PLIST" >/dev/null
          echo "PROVISIONING_PROFILE=$PROFILE_PATH" >> "$GITHUB_ENV"

      - name: Build application
        env:
          UPDATE_REPOSITORY: ${{ github.repository }}
        run: |
          BUILD_NUMBER=$((1000 + GITHUB_RUN_NUMBER))
          VERSION="1.0.$BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          ./scripts/build-app.sh \
            --identity "$SIGNING_IDENTITY" \
            --provisioning-profile "$PROVISIONING_PROFILE" \
            --version "$VERSION" \
            --build "$BUILD_NUMBER" \
            --update-repository "$UPDATE_REPOSITORY"

      - name: Notarize and staple application
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          SUBMISSION="$RUNNER_TEMP/Prompter-notarization.zip"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY" > "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          ditto -c -k --sequesterRsrc --keepParent build/Prompter.app "$SUBMISSION"
          xcrun notarytool submit "$SUBMISSION" \
            --key "$API_KEY_PATH" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER" \
            --wait
          xcrun stapler staple build/Prompter.app
          xcrun stapler validate build/Prompter.app
          spctl --assess --type execute --verbose=4 build/Prompter.app

      - name: Package and create update manifest
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent build/Prompter.app dist/Prompter.zip
          SHA256="$(shasum -a 256 dist/Prompter.zip | awk '{print $1}')"
          jq -n \
            --arg version "$VERSION" \
            --argjson build "$BUILD_NUMBER" \
            --arg sha256 "$SHA256" \
            --arg notes "Update from commit $GITHUB_SHA" \
            '{version: $version, build: $build, sha256: $sha256, notes: $notes}' \
            > dist/update.json

      - name: Verify packaged release
        run: |
          VERIFY_DIR="$RUNNER_TEMP/prompter-release-verify"
          test ! -e "$VERIFY_DIR"
          mkdir -p "$VERIFY_DIR"
          ditto -x -k dist/Prompter.zip "$VERIFY_DIR"

          APP="$VERIFY_DIR/Prompter.app"
          test -f "$APP/Contents/embedded.provisionprofile"
          EMBEDDED_PROFILE="$VERIFY_DIR/embedded-profile.plist"
          security cms -D -i "$APP/Contents/embedded.provisionprofile" > "$EMBEDDED_PROFILE"
          test "$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.application-identifier' "$EMBEDDED_PROFILE")" = "F3FXXB2HL6.com.drew.prompter"
          /usr/libexec/PlistBuddy -c 'Print :Entitlements:com.apple.developer.associated-domains' "$EMBEDDED_PROFILE" >/dev/null
          codesign --verify --deep --strict --verbose=4 "$APP"
          SIGNED_ENTITLEMENTS="$VERIFY_DIR/signed-entitlements.plist"
          codesign -d --entitlements :- "$APP" > "$SIGNED_ENTITLEMENTS"
          /usr/libexec/PlistBuddy \
            -c "Print :com.apple.developer.associated-domains" \
            "$SIGNED_ENTITLEMENTS" \
            | grep -Fqx "    webcredentials:www.ambitious.social"
          xcrun stapler validate "$APP"
          spctl --assess --type execute --verbose=4 "$APP"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$VERSION"
          gh release create "$TAG" \
            dist/Prompter.zip \
            dist/update.json \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Prompter $VERSION" \
            --generate-notes \
            --latest

      - name: Remove temporary signing keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP"/AuthKey_*.p8
          security delete-keychain "$RUNNER_TEMP/prompter-signing.keychain-db" 2>/dev/null || true
